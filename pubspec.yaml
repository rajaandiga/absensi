name: absensi
description: Aplikasi Absensi BPS Provinsi Jambi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Lokasi & GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # WiFi / Network info
  network_info_plus: ^5.0.3

  # HTTP client (untuk koneksi ke backend BPS nanti)
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local storage (simpan token login)
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Export Excel
  excel: ^4.0.2
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # QR Code (tampilan QR di layar)
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true